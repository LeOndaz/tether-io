services:
  dht-bootstrap:
    build: ./dht-bootstrap
    environment:
      - DHT_PORT=49737
      - DHT_HOST=0.0.0.0
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 2s
      timeout: 3s
      retries: 5
      start_period: 3s

  gateway:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - HOST=0.0.0.0
      - LOG_LEVEL=info
      - DHT_BOOTSTRAP=dht-bootstrap:49737
      - CLUSTER_TOPIC=ai-paas-cluster-v1
      - RATE_LIMIT_REQUESTS_PER_MIN=60
      - RATE_LIMIT_TOKENS_PER_HOUR=100000
      # IMPORTANT: Change these values for production. See .env.example.
      - SESSION_SECRET=change-me-to-a-very-long-secret-phrase-at-least-32-chars
      - SESSION_SALT=aipaas-salt-16ch
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=admin
      - WORKER_SECRET=dev-worker-secret-change-me
    # Bind-mount source for hot reload via tsx --watch
    command: ["pnpm", "run", "dev"]
    volumes:
      - ./backend/src:/app/src
      - /app/node_modules # prevent host node_modules from overriding container's
      - gateway_storage:/app/storage
    depends_on:
      dht-bootstrap:
        condition: service_healthy

  worker-1:
    build: ./worker
    environment:
      - WORKER_ID=worker-1
      - OLLAMA_URL=http://host.docker.internal:11434
      - MODEL_RUNTIME=ollama
      - CLUSTER_TOPIC=ai-paas-cluster-v1
      - DHT_BOOTSTRAP=dht-bootstrap:49737
      - WORKER_STREAM_PORT=8080
      - WORKER_STREAM_HOST=worker-1
      - WORKER_SECRET=dev-worker-secret-change-me
      - LOG_LEVEL=info
    # Bind-mount source for hot reload via tsx --watch
    command: ["pnpm", "run", "dev"]
    volumes:
      - ./worker/src:/app/src
      - /app/node_modules
      - worker1_storage:/app/storage
    depends_on:
      dht-bootstrap:
        condition: service_healthy

  worker-2:
    build: ./worker
    environment:
      - WORKER_ID=worker-2
      - OLLAMA_URL=http://host.docker.internal:11434
      - MODEL_RUNTIME=ollama
      - CLUSTER_TOPIC=ai-paas-cluster-v1
      - DHT_BOOTSTRAP=dht-bootstrap:49737
      - WORKER_STREAM_PORT=8080
      - WORKER_STREAM_HOST=worker-2
      - WORKER_SECRET=dev-worker-secret-change-me
      - LOG_LEVEL=info
    # Bind-mount source for hot reload via tsx --watch
    command: ["pnpm", "run", "dev"]
    volumes:
      - ./worker/src:/app/src
      - /app/node_modules
      - worker2_storage:/app/storage
    depends_on:
      dht-bootstrap:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3000
    # Bind-mount source for Vite HMR (hot module replacement)
    volumes:
      - ./frontend/src:/app/src
      - /app/node_modules

volumes:
  gateway_storage:
  worker1_storage:
  worker2_storage:
